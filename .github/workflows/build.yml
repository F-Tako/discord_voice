name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install SpeechRecognition pyaudio requests pyinstaller

      - name: Build VoiceDiscord
        run: pyinstaller --onefile --noconsole --name "VoiceDiscord" voice_discord.py

      - name: Upload VoiceDiscord
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDiscord-exe
          path: dist/VoiceDiscord.exe
