name: Build EXE
on:
  push:
    paths:
      - 'VoiceDiscord.py'
      - '.github/workflows/build.yml'
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests pyinstaller
      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name "VoiceDiscord" VoiceDiscord.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDiscord-exe
          path: dist/VoiceDiscord.exe
